services:
  postgres_crypto:
    image: postgres:15
    container_name: postgres_crypto
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password123
      - POSTGRES_DB=crypto_db
    ports:
      - "5434:5432"
    volumes:
      - crypto_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d crypto_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  airflow_crypto:
    build: .
    container_name: airflow_crypto
    depends_on:
      postgres_crypto:
        condition: service_healthy
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://admin:password123@postgres_crypto/crypto_db
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./logs:/opt/airflow/logs
    ports:
      - "8081:8080"
    command: >
      bash -c "airflow db init &&
      airflow users create --username admin --firstname admin --lastname admin --role Admin --email admin@example.com --password admin &&
      airflow standalone"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana_crypto
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana 
    depends_on:
      - postgres_crypto


volumes:
  crypto_db_data:
  grafana_data:   